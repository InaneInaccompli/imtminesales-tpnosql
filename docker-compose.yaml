services:
  database_sql:
    image: 'postgres:latest'
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_senders=0"
  
  database_nosql:
    image: neo4j:latest
    volumes:  
      - /$HOME/neo4j/logs:/logs
      - /$HOME/neo4j/config:/config
      - /$HOME/neo4j/data:/data
      - /$HOME/neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_server_memory_heap_initial__size=2G
      - NEO4J_server_memory_heap_max__size=4G
      - NEO4J_server_memory_pagecache_size=2G
      - NEO4J_db_memory_transaction_total_max=0
      - NEO4J_db_tx__log_rotation_retention__policy=2G size
      - NEO4J_db_checkpoint_interval_time=60s
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: always

  website:
    build: ./analyseur
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    stdin_open: true

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - database_sql
      - database_nosql
    volumes:
      - sqlite_data:/data
    environment:
      - DB_SQL_HOST=database_sql
      - DB_SQL_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - NEO4J_URI=bolt://database_nosql:7687
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - SQLITE_PATH=/data/results.db
    restart: on-failure

volumes:
  sqlite_data: